services:
  - type: web
    name: groundwater-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_LOCAL_DATA_ONLY
        value: "false"
      - key: VITE_ENABLE_LIVE_API
        value: "true"
      - key: VITE_API_BASE_URL
        value: "https://your-backend.onrender.com"
