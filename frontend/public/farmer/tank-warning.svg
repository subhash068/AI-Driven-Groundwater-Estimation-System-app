  </defs>
  <rect x="15" y="10" width="90" height="100" rx="15" fill="none" stroke="rgba(245, 158, 11, 0.3)" stroke-width="2" />
  <rect x="20" y="70" width="80" height="35" rx="10" fill="url(#warnGrad)" filter="url(#glow)" />
  <path d="M20 70 Q60 60 100 70" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" />
  <text x="60" y="92" font-family="Arial" font-size="10" fill="white" text-anchor="middle" font-weight="bold">LOW</text>
