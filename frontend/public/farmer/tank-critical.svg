<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="critGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect x="15" y="10" width="90" height="100" rx="15" fill="none" stroke="rgba(239, 68, 68, 0.3)" stroke-width="2" />
  <rect x="20" y="90" width="80" height="15" rx="5" fill="url(#critGrad)" filter="url(#glow)" />
  <path d="M20 90 Q60 85 100 90" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" />
  <text x="60" y="102" font-family="Arial" font-size="8" fill="white" text-anchor="middle" font-weight="bold">ALERT</text>
</svg>
