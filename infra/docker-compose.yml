services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: groundwater_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-groundwater}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/phase1_postgis.sql:/docker-entrypoint-initdb.d/01_phase1_postgis.sql:ro
      - ../database/phase2_feature_store.sql:/docker-entrypoint-initdb.d/02_phase2_feature_store.sql:ro
      - ../database/phase3_api_support.sql:/docker-entrypoint-initdb.d/03_phase3_api_support.sql:ro
      - ../database/phase4_security_ingestion.sql:/docker-entrypoint-initdb.d/04_phase4_security_ingestion.sql:ro
      - ../database/phase5_bootstrap.sql:/docker-entrypoint-initdb.d/05_phase5_bootstrap.sql:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-groundwater}
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: groundwater_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  bootstrap:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: groundwater_bootstrap
    restart: "no"
    environment:
      DB_DSN_SYNC: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-groundwater}
      BOOTSTRAP_MODE: ${BOOTSTRAP_MODE:-full}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-ChangeMe123!}
      DATA_VERSION: ${DATA_VERSION:-}
    command: ["python", "-m", "scripts.bootstrap_postgres_from_files"]
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: groundwater_backend
    restart: unless-stopped
    environment:
      DB_DSN: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-groundwater}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change_me_in_production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost,http://127.0.0.1}
      CORS_ALLOW_ORIGIN_REGEX: ${CORS_ALLOW_ORIGIN_REGEX:-^https?://(localhost|127\\.0\\.0\\.1)(:\\d+)?$}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_reports:/app/reports

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_API_BASE: ${VITE_API_BASE:-/api}
        VITE_ENABLE_LIVE_API: ${VITE_ENABLE_LIVE_API:-true}
        VITE_LOCAL_DATA_ONLY: ${VITE_LOCAL_DATA_ONLY:-false}
    container_name: groundwater_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  postgres_data:
  backend_reports:
